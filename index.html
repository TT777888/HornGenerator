<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horn Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside class="panel">
      <div class="panel-header">
        <div>
          <h1>Horn Generator</h1>
          <p>オリジナルの角をデザイン</p>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label for="preset">タイプ</label>
          <select id="preset">
            <option value="rhino">サイ</option>
            <option value="devil">悪魔</option>
            <option value="spiral">らせん</option>
            <option value="antler">鹿風</option>
          </select>
        </div>

        <div class="field">
          <label for="size">大きさ <span id="sizeValue">5.0</span></label>
          <input type="range" id="size" min="1" max="10" step="0.1" value="5.0" />
        </div>

        <div class="field">
          <label for="curve">曲がり <span id="curveValue">1.2</span></label>
          <input type="range" id="curve" min="-3" max="3" step="0.01" value="1.2" />
        </div>

        <div class="field">
          <label for="twist">らせん <span id="twistValue">0.4</span></label>
          <input type="range" id="twist" min="-4" max="4" step="0.01" value="0.4" />
        </div>

        <div class="field">
          <label for="texture">節・凹凸 <span id="textureValue">0.4</span></label>
          <input type="range" id="texture" min="0" max="1" step="0.01" value="0.4" />
        </div>

        <div class="field">
          <label for="branches">分岐 <span id="branchesValue">0</span></label>
          <input type="range" id="branches" min="0" max="4" step="1" value="0" />
        </div>

        <div class="field">
          <label for="color">色</label>
          <input type="color" id="color" value="#cdb79e" />
        </div>
      </div>

      <div class="actions">
        <button id="presetBtn" class="secondary">プリセット反映</button>
        <button id="randomBtn">ランダム</button>
        <button id="resetBtn" class="secondary">リセット</button>
      </div>
    </aside>

    <main id="viewer"></main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
